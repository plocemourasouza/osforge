# --- Schema Definition ---

schema:
  project:
    type: string
    required: true
    description: Nome kebab-case do projeto/feature

  description:
    type: string
    required: true
    description: Descrição curta da demanda

  triage:
    type: enum
    values: [quick, standard, complex]
    required: true

  status:
    type: enum
    values: [active, paused, complete, cancelled]
    required: true

  created:
    type: datetime
    required: true

  updated:
    type: datetime
    required: true

  plan:
    type: object
    properties:
      approved:
        type: boolean
      approved_at:
        type: datetime

  phases:
    type: array
    items:
      type: object
      properties:
        name:
          type: string
          required: true
        status:
          type: enum
          values: [pending, in-progress, complete, skipped, cancelled, blocked]
          required: true
        skill:
          type: string
          description: Path do skill usado
        artifact:
          type: string
          nullable: true
          description: Path relativo do artefato produzido
        started:
          type: datetime
          nullable: true
        completed:
          type: datetime
          nullable: true

  corrections:
    type: array
    description: Histórico de course corrections
    items:
      type: object
      properties:
        date:
          type: datetime
        reason:
          type: string
        impact:
          type: string
        phases_affected:
          type: array
          items:
            type: string
